<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layment Viewer</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="panel debug-only">
        <h3>SVG → 3D ложемент</h3>
        <input id="file" type="file" accept=".svg,image/svg+xml" />
        <button id="upload">Upload SVG</button>
        <div id="errors" class="status status-error" role="status" aria-live="polite"></div>
        <div id="meta" class="status status-meta"></div>
      </aside>

      <main class="viewport">
        <div class="preview-header preview-only">
          <div class="preview-card">
            <h1>3D предпросмотр</h1>
            <p>Потяните мышью, чтобы вращать модель.</p>
          </div>
        </div>

        <div id="preview-state" class="preview-state preview-only" role="status" aria-live="polite"></div>
        <div id="canvas-root"></div>
      </main>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
